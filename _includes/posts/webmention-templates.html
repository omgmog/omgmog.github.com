<script type="text/template" id="tpl-comment">
  <article class="reply%is_author_class%" data-source="github">
    <img src="%author_avatar_url%" alt="%author_name%'s avatar picture" class="avatar" data-username="%author_name%" loading="lazy">
    <header>
      <h4><a href="%author_url%" rel="nofollow" class="name">%author_name%</a> %verb% <a href="%url%" rel="nofollow">on <time datetime="%date%">%date_formatted%</time> via %domain%</a></h4>
    </header>
    <div>%body%</div>
  </article>
</script>
<script type="text/template" id="tpl-reply">
  <article class="reply%is_author_class%" data-source="webmention" data-platform="%platform%">
    <img src="%author_avatar_url%" alt="%author_name%'s avatar picture" class="avatar" data-username="%author_name%" loading="lazy">
    <header>
      <h4><a href="%author_url%" rel="nofollow" class="name">%author_name%</a> %verb% <a href="%url%" rel="nofollow">on <time datetime="%date%">%date_formatted%</time> via %domain%</a></h4>
    </header>
    <div>%body%</div>
  </article>
</script>
<script type="text/template" id="tpl-like">
  <div class="like">
    <img src="%author_avatar_url%" alt="%author_name%'s avatar picture" title="%verb% by %author_name% on %domain%" class="avatar" data-username="%author_name%" loading="lazy">
  </div>
</script>
<script type="text/template" id="tpl-bookmark">
  <div class="like">
    <img src="%author_avatar_url%" alt="%author_name%'s avatar picture" title="%verb% by %author_name% on %domain%" class="avatar" data-username="%author_name%" loading="lazy">
  </div>
</script>
<script type="text/template" id="tpl-bookmark-reddit">
  <article class="reply mention" data-source="webmention" data-platform="reddit">
    <div><p>Shared to <a href="https://www.reddit.com/r/%subreddit%" rel="nofollow">/r/%subreddit%</a> by %author_name%: <a href="%url%" rel="nofollow">%url%</a> on <time datetime="%date%">%date_formatted%</time></p></div>
  </article>
</script>
<script type="text/template" id="tpl-mention-lemmy">
  <article class="reply mention" data-source="webmention" data-platform="lemmy">
    <div><p>Shared to <a href="%community_url%" rel="nofollow">!%community_name%</a> by %author_name%: <a href="%url%" rel="nofollow">%url%</a> on <time datetime="%date%">%date_formatted%</time></p></div>
  </article>
</script>
<script type="text/template" id="tpl-repost">
  <div class="like">
    <a href="%url%" rel="nofollow" title="%verb% by %author_name% on %domain%"><img src="%author_avatar_url%" alt="%author_name%'s avatar picture" class="avatar" data-username="%author_name%" loading="lazy"></a>
  </div>
</script>
<script type="text/template" id="tpl-mention">
  <article class="reply mention" data-source="webmention" data-platform="%platform%">
    <div><p>%verb% in <a href="%url%" rel="nofollow">%url%</a> on <time datetime="%date%">%date_formatted%</time></p></div>
  </article>
</script>
<script type="text/template" id="tpl-mention-rich">
  <article class="reply mention-rich%is_author_class%" data-source="webmention" data-platform="%platform%">
    <img src="%author_avatar_url%" alt="%author_name%'s avatar picture" class="avatar" data-username="%author_name%" loading="lazy">
    <header>
      <h4><a href="%author_url%" rel="nofollow" class="name">%author_name%</a> %verb% <a href="%url%" rel="nofollow">on <time datetime="%date%">%date_formatted%</time> via %domain%</a></h4>
    </header>
    <div>%summary%</div>
  </article>
</script>
