<svg viewBox="0 0 640 520" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', 'Arial Nova', Helvetica, Arial, sans-serif" role="img" aria-label="Scatter plot of average stated confidence against actual hit rate for each AI model, with a dashed perfectly-calibrated line. GPT-5.5 and Gemini 3.5 Flash sit above the line (overconfident), Gemini 3.1 Pro sits on it, and Claude Fable 5 and Claude Sonnet 4.6 sit below it (underconfident).">
<title>Confidence vs actual hit rate by entrant</title>
<style>
  text { fill: light-dark(#1a1a1a, #f0f0f0); }
  .axis, .tick { stroke: light-dark(#1a1a1a, #f0f0f0); }
  .diagonal { stroke: light-dark(#1a1a1a, #f0f0f0); opacity: 0.4; }
  .diagonal-label { fill: light-dark(#1a1a1a, #f0f0f0); opacity: 0.6; }
  .dot-blue { fill: light-dark(#1a5fb4, #5fa8f5); }
  .dot-red { fill: light-dark(#d6261b, #ff3b30); }
  .dot-grey { fill: light-dark(#1a1a1a, #f0f0f0); opacity: 0.55; }
  .label-blue { fill: light-dark(#1a5fb4, #5fa8f5); font-weight: 700; }
  .label-red { fill: light-dark(#d6261b, #ff3b30); }
  .label-grey { fill: light-dark(#1a1a1a, #f0f0f0); opacity: 0.55; }
</style>
