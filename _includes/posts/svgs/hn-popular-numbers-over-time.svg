<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', 'Arial Nova', Helvetica, Arial, sans-serif" role="img" aria-label="Line chart showing appearances of the top 10 numbers in Hacker News titles from 2007 to 2025. Most numbers track steadily upward then plateau. 19 spikes dramatically in 2020 due to COVID-19 before falling back. 4 spikes in 2023 due to GPT-4.">
