<h3 class="wide-h3">Blog sections</h3>
    
<nav class="sidebar-secondary-nav">
    <ul>
        {% for item in site.data.nav_secondary %}
            <li><a href="{{ item.url }}"{% if page.url == item.url or page.url contains item.url and item.url != '/' %} class="active"{% endif %}>{% if item.icon %}<svg aria-label="{{ item.label }}" focusable="false"><use href="#{{ item.icon }}"></use></svg>{% else %}{{ item.label }}{% endif %}</a></li>
        {% endfor %}
    </ul>
</nav>
