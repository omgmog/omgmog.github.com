name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      send_all_webmentions:
        description: 'Send webmentions for every post (one-off backfill)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Restore image cache
        id: image-cache
        uses: actions/cache@v5
        with:
          path: _site/images/**/*.webp
          key: images-${{ hashFiles('images/**/*') }}
          restore-keys: |
            images-

      - name: Build with Jekyll
        run: bundle exec jekyll build --lsi --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Install ImageMagick
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libmagickwand-dev

      - name: Optimize images
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: bundle exec ruby scripts/optimize_images.rb _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  webmentions:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Send webmentions for all posts
        if: github.event.inputs.send_all_webmentions == 'true'
        run: bundle exec ruby scripts/send_webmentions.rb --all
        env:
          WEBMENTION_APP_TOKEN: ${{ secrets.WEBMENTION_APP_TOKEN }}

      - name: Send webmentions for changed posts
        if: github.event.inputs.send_all_webmentions != 'true'
        run: |
          changed=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- _posts _lwal | tr '\n' ' ')
          if [ -n "$changed" ]; then
            bundle exec ruby scripts/send_webmentions.rb $changed
          else
            echo "No changed posts in this push"
          fi
        env:
          WEBMENTION_APP_TOKEN: ${{ secrets.WEBMENTION_APP_TOKEN }}
