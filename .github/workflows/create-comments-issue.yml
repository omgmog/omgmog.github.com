name: Create Comments Issue

on:
  workflow_run:
    workflows: ["Deploy Jekyll site to Pages"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  create-comments-issue:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Find newly added posts
        id: added
        run: |
          added=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- '_posts/**' | tr '\n' ' ')
          echo "files=$added" >> $GITHUB_OUTPUT

      - name: Setup Ruby
        if: steps.added.outputs.files != ''
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Create missing comments issues
        if: steps.added.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADDED_POSTS: ${{ steps.added.outputs.files }}
        run: ruby scripts/create_comments_issues.rb $ADDED_POSTS
